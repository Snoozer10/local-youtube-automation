name: "CI"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          choco install ffmpeg audacity -y --no-progress
          # Note: Audacity mod-script-pipe requires manual enable in CI
        shell: pwsh

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt
          python -m playwright install --with-deps

      - name: Run unit tests
        run: python -m pytest tests/unit -v --tb=short

      # Integration tests require GUI browsers + Audacity — run locally
      # - name: Run integration tests
      #   run: python -m pytest tests/integration -v --tb=short